name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v2

      - name: Build, test and run integration tests
        run: mvn -B clean install --file pom.xml

      - name: Run mutation tests
        run: mvn -B -pl GWT_Keezenspel-server pitest:mutationCoverage

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pit-report
          path: GWT_Keezenspel-server/target/pit-reports/