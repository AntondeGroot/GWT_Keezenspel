name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ── OpenAPI spec lint ────────────────────────────────────────────────
  openapi-lint:
    name: OpenAPI lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
      - name: Lint OpenAPI spec
        run: npx --yes @redocly/cli@2 lint

  # ── Angular (frontend) tests ─────────────────────────────────────────
  angular:
    name: Angular tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      # The generator jar is stored outside node_modules (openapitools.json storageDir)
      # so it survives npm ci and can be cached; keyed on the pinned generator version.
      # Cache invalidates automatically when openapitools.json (the version) changes.
      - name: Cache OpenAPI generator jar
        uses: actions/cache@v6
        with:
          path: frontend/.openapi-generator-cli
          key: openapi-generator-cli-${{ hashFiles('frontend/openapitools.json') }}
      - name: Ensure OpenAPI generator jar
        run: |
          ver=$(node -p "require('./openapitools.json')['generator-cli'].version")
          jar=".openapi-generator-cli/${ver}.jar"
          if [ ! -f "$jar" ]; then
            mkdir -p .openapi-generator-cli
            for i in 1 2 3; do
              curl -fsSL -o "$jar" \
                "https://repo1.maven.org/maven2/org/openapitools/openapi-generator-cli/${ver}/openapi-generator-cli-${ver}.jar" && break
              echo "download attempt $i failed; retrying..."; sleep 5
            done
          fi
      # postinstall generates the OpenAPI client, so npm ci produces src/app/api
      - run: npm ci
      - name: Lint (eslint, --max-warnings=0)
        run: npm run lint
      - name: Format check (prettier)
        run: npm run format:check
      - name: Unit tests + coverage
        run: npm run test:coverage

  # ── Frontend end-to-end tests (Playwright) ───────────────────────────
  e2e:
    name: Frontend e2e (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Java runs the backend (with the /test seeding hooks); Node runs Angular +
      # Playwright. The browser hits `ng serve`, which proxies the API to :4200.
      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      # The generator jar is stored outside node_modules (openapitools.json storageDir)
      # so it survives npm ci and can be cached; keyed on the pinned generator version.
      # Cache invalidates automatically when openapitools.json (the version) changes.
      - name: Cache OpenAPI generator jar
        uses: actions/cache@v6
        with:
          path: frontend/.openapi-generator-cli
          key: openapi-generator-cli-${{ hashFiles('frontend/openapitools.json') }}
      - name: Ensure OpenAPI generator jar
        working-directory: frontend
        run: |
          ver=$(node -p "require('./openapitools.json')['generator-cli'].version")
          jar=".openapi-generator-cli/${ver}.jar"
          if [ ! -f "$jar" ]; then
            mkdir -p .openapi-generator-cli
            for i in 1 2 3; do
              curl -fsSL -o "$jar" \
                "https://repo1.maven.org/maven2/org/openapitools/openapi-generator-cli/${ver}/openapi-generator-cli-${ver}.jar" && break
              echo "download attempt $i failed; retrying..."; sleep 5
            done
          fi
      # postinstall generates the OpenAPI client, so npm ci produces src/app/api
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Boot backend (:4200) and run Playwright
        working-directory: frontend
        env:
          E2E_API_URL: http://localhost:4200
          CI: '1'
        run: |
          # Backend with the /test hooks on :4200 (matches proxy.conf.json). The `test`
          # Spring profile enables TestResetController (/test/**), gated off in production.
          # -Denv=dev skips the env-prod GWT-app unpack (the browser loads the
          # Angular app from ng serve, not the backend's static resources).
          ( cd .. && nohup mvn -B -Denv=dev -pl backend -am spring-boot:run \
              -Dspring-boot.run.arguments="--server.port=4200 --spring.profiles.active=test --spring.devtools.restart.enabled=false" \
              > "$RUNNER_TEMP/backend.log" 2>&1 & )
          echo "Waiting for backend on :4200 ..."
          for i in $(seq 1 150); do
            curl -sf http://localhost:4200/game-options >/dev/null 2>&1 && { echo "Backend up"; break; }
            sleep 2
          done
          curl -sf http://localhost:4200/game-options >/dev/null 2>&1 || {
            echo "::error::Backend failed to start"; tail -n 150 "$RUNNER_TEMP/backend.log"; exit 1; }
          # Playwright's webServer starts `ng serve`; globalSetup warms its compile.
          npx playwright test
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7
          if-no-files-found: ignore

  # ── Backend (server) unit tests ──────────────────────────────────────
  backend:
    name: Backend unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
      # verify runs the full gate: -Werror compile, enforcer, tests (incl. ArchUnit +
      # context smoke test), SpotBugs, and the JaCoCo coverage check.
      - name: Verify server
        run: mvn -B -Denv=dev -pl backend -am clean verify

  # ── Mutation tests (server) ──────────────────────────────────────────
  mutation:
    name: Mutation tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
      # Install the modules first so the deps are in the local repo, then run PIT on
      # the server module ALONE — the `pitest` prefix only resolves against that pom
      # (a multi-module `-am` reactor can't resolve it). Mirrors the original CI.
      - name: Build (deps into local repo)
        run: mvn -B -Denv=dev -DskipTests install
      - name: PIT mutation coverage
        run: mvn -B -Denv=dev -pl backend pitest:mutationCoverage
      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pit-report
          path: backend/target/pit-reports/