name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ── OpenAPI spec lint ────────────────────────────────────────────────
  openapi-lint:
    name: OpenAPI lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Lint OpenAPI spec
        run: npx --yes @redocly/cli@2 lint

  # ── Angular (frontend) tests ─────────────────────────────────────────
  angular:
    name: Angular tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      # postinstall generates the OpenAPI client, so npm ci produces src/app/api
      - run: npm ci
      - name: Unit tests (Vitest)
        run: npm test -- --no-watch

  # ── Frontend end-to-end tests (Playwright) ───────────────────────────
  e2e:
    name: Frontend e2e (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Java runs the backend (with the /test seeding hooks); Node runs Angular +
      # Playwright. The browser hits `ng serve`, which proxies the API to :4200.
      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      # postinstall generates the OpenAPI client, so npm ci produces src/app/api
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Boot backend (:4200) and run Playwright
        working-directory: frontend
        env:
          E2E_API_URL: http://localhost:4200
          CI: '1'
        run: |
          # Backend with the /test hooks on :4200 (matches proxy.conf.json).
          # -Denv=dev skips the env-prod GWT-app unpack (the browser loads the
          # Angular app from ng serve, not the backend's static resources).
          ( cd .. && nohup mvn -B -Denv=dev -pl GWT_Keezenspel-server -am spring-boot:run \
              -Dspring-boot.run.arguments="--server.port=4200 --spring.devtools.restart.enabled=false" \
              > "$RUNNER_TEMP/backend.log" 2>&1 & )
          echo "Waiting for backend on :4200 ..."
          for i in $(seq 1 150); do
            curl -sf http://localhost:4200/game-options >/dev/null 2>&1 && { echo "Backend up"; break; }
            sleep 2
          done
          curl -sf http://localhost:4200/game-options >/dev/null 2>&1 || {
            echo "::error::Backend failed to start"; tail -n 150 "$RUNNER_TEMP/backend.log"; exit 1; }
          # Playwright's webServer starts `ng serve`; globalSetup warms its compile.
          npx playwright test
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7
          if-no-files-found: ignore

  # ── GWT client unit tests (Java) ─────────────────────────────────────
  gwt-unit:
    name: GWT client unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
      # `test` phase = surefire only (no GWT compile, no server). -Denv=dev keeps
      # the env-prod GWT-app unpack off; -am builds the shared module dependency.
      - name: Test GWT client
        run: mvn -B -Denv=dev -pl GWT_Keezenspel-client -am test

  # ── Backend (server) unit tests ──────────────────────────────────────
  backend:
    name: Backend unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
      # Even pure unit tests need Chrome: BaseUnitTest's SpringAppSuiteExtension
      # runs WebDriverManager.chromedriver().setup() for the whole suite.
      - uses: browser-actions/setup-chrome@v2
      # -Denv=dev skips the env-prod GWT-app unpack (server unit tests don't need
      # the compiled client). Failsafe (*_IT) doesn't run in the `test` phase.
      - name: Test server
        run: mvn -B -Denv=dev -pl GWT_Keezenspel-server -am test

  # ── GWT integration tests (Selenium browser) ─────────────────────────
  gwt-integration:
    name: GWT integration tests (browser)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
      - uses: browser-actions/setup-chrome@v2
      # Full default build (env-prod) so the compiled GWT app is served at :4200;
      # run only the failsafe *_IT browser tests (surefire runs in the jobs above).
      - name: Run *_IT (Selenium)
        run: mvn -B clean verify -Dsurefire.skip=true

  # ── Mutation tests (server) ──────────────────────────────────────────
  mutation:
    name: Mutation tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
      # PIT runs the server unit tests, which (via BaseUnitTest) set up ChromeDriver.
      - uses: browser-actions/setup-chrome@v2
      # Install the modules first so the deps are in the local repo, then run PIT on
      # the server module ALONE — the `pitest` prefix only resolves against that pom
      # (a multi-module `-am` reactor can't resolve it). Mirrors the original CI.
      - name: Build (deps into local repo)
        run: mvn -B -Denv=dev -DskipTests install
      - name: PIT mutation coverage
        run: mvn -B -Denv=dev -pl GWT_Keezenspel-server pitest:mutationCoverage
      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pit-report
          path: GWT_Keezenspel-server/target/pit-reports/