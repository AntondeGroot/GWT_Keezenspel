@if (tiles().length) {
  <div class="play">
    <div class="stage">
      <div class="board" [style.--cell]="cell() / 6">
        @for (t of tiles(); track t.playerId + ':' + t.tileNr) {
          <div class="tile"
               [class.tile-highlight-pulse]="isPreview(t.playerId, t.tileNr)"
               [style.left.%]="t.x / 6"
               [style.top.%]="t.y / 6"
               [style.background-color]="t.color"></div>
        }
        @for (p of pawns(); track p.id){
          <app-pawn class="pawn"
                    [attr.data-testid]="'pawn-' + p.id"
                    [color]="p.color"
                    (click)="selectPawn(p.id)"
                    [highlight]="p.id === pawn1Id() ? highlightForPawn1(p.color)
                             : p.id === pawn2Id() ? highlightForPawn2(p.color)
                             : undefined"
                    [style.left.%]="p.x / 6"
                    [style.top.%]="p.y / 6"
                    [style.--move-ms]="p.moveMs + 'ms'"
                    [style.z-index]="p.zIndex" />
        }
        @for (b of cardBacks(); track b.key) {
          <div class="card-back"
               [style.left.%]="b.x / 6"
               [style.top.%]="b.y / 6"
               [style.--rot.deg]="b.rot"
               [style.z-index]="b.z"
               [style.transition-delay.ms]="b.delay"></div>
        }
      </div>

      <!-- Cards live in their own layer (not inside .board), overlaid on the same
           box so the pile lines up with the board centre. The hand sits below in
           the reserved space (.stage padding). -->
      <div class="card-layer">
        @for (c of cards(); track c.uuid) {
          <app-card class="card"
            [attr.data-testid]="'card-' + c.value"
            [suit]="c.suit"
            [value]="c.value"
            [style.left.%]="c.x"
            [style.top.%]="c.y"
            [style.--rot.deg]="c.rot"
            [style.--card-scale]="c.scale"
            [style.z-index]="c.z"
            [style.transition-delay.ms]="c.dealDelay"
            [style.--deal-delay]="c.dealDelay"
            [class.selected]="selectedCardUuid() === c.uuid"
            [class.special]="c.special"
            [class.played]="c.inPile"
            [class.dealing]="c.dealing"
            (click)="selectCard(c.uuid)"
            (mouseenter)="hoverCard(c.value)"
            (mouseleave)="hoverCard(null)" />
        }

        @for (f of flyers(); track f.id) {
          <app-card class="card flyer"
            [suit]="f.suit"
            [value]="f.value"
            [style.left.%]="f.x"
            [style.top.%]="f.y"
            [style.--rot.deg]="f.rot"
            [style.--card-scale]="f.scale" />
        }
      </div>
    </div>

    <!-- Suggestion for the hovered/selected special card (empty for regular cards).
         A flow row centered below the hand; the cards stay absolutely positioned so
         a played card can still fly to the pile. -->
    <div class="card-hint">{{ hint() }}</div>

    <!-- Actions + roster. Desktop: a column pinned to the right gutter. Mobile: a
         row directly below the hint. -->
    <div class="controls">
      <div class="button-container">
        <button class="send-button" [disabled]="!canPlay()" (click)="playCard()">{{ i18n.t('playCard') }}</button>
        <button class="forfeit-button" (click)="forfeit()">{{ i18n.t('forfeit') }}</button>

        <!-- 7-split: divide the 7 across the two selected pawns (sum stays 7). -->
        @if (splitVisible()) {
          <div class="pawn-steps">
            <div class="pawn-steps__row">
              <label class="pawn-steps__label" [style.color]="pawn1Highlight()">{{ i18n.t('pawn1') }}</label>
              <button type="button" class="pawn-step-btn" (click)="stepPawn1(-1)">−</button>
              <input class="pawn-steps__input" type="number" min="0" max="7"
                     [style.border-color]="pawn1Highlight()"
                     [value]="stepsPawn1()" (input)="onStepsPawn1($any($event.target).value)" />
              <button type="button" class="pawn-step-btn" (click)="stepPawn1(1)">+</button>
            </div>
            <div class="pawn-steps__row">
              <label class="pawn-steps__label" [style.color]="pawn2Highlight()">{{ i18n.t('pawn2') }}</label>
              <button type="button" class="pawn-step-btn" (click)="stepPawn2(-1)">−</button>
              <input class="pawn-steps__input" type="number" min="0" max="7"
                     [style.border-color]="pawn2Highlight()"
                     [value]="stepsPawn2()" (input)="onStepsPawn2($any($event.target).value)" />
              <button type="button" class="pawn-step-btn" (click)="stepPawn2(1)">+</button>
            </div>
          </div>
        }
      </div>

      <app-player-list />
    </div>
  </div>
}
