@if (tiles().length) {
  <div class="stage">
    <div class="board" [style.--cell]="cell() / 6">
      @for (t of tiles(); track t.playerId + ':' + t.tileNr) {
        <div class="tile"
             [class.tile-highlight-pulse]="isPreview(t.playerId, t.tileNr)"
             [style.left.%]="t.x / 6"
             [style.top.%]="t.y / 6"
             [style.background-color]="t.color"></div>
      }
      @for (p of pawns(); track p.id){
        <app-pawn class="pawn"
                  [color]="p.color"
                  (click)="selectPawn(p.id)"
                  [highlight]="p.id === pawn1Id() ? highlightForPawn1(p.color)
                           : p.id === pawn2Id() ? highlightForPawn2(p.color)
                           : undefined"
                  [style.left.%]="p.x / 6"
                  [style.top.%]="p.y / 6"
                  [style.z-index]="p.zIndex" />
      }
    </div>

    <!-- Cards live in their own layer (not inside .board), overlaid on the same
         box so the pile lines up with the board centre. The hand sits below in
         the reserved space (.stage padding). -->
    <div class="card-layer">
      @for (c of cards(); track c.uuid) {
        <app-card class="card"
          [suit]="c.suit"
          [value]="c.value"
          [style.left.%]="c.x"
          [style.top.%]="c.y"
          [style.--rot.deg]="c.rot"
          [style.--card-scale]="c.scale"
          [style.z-index]="c.z"
          [class.selected]="selectedCardUuid() === c.uuid"
          (click)="selectCard(c.uuid)" />
      }
    </div>

    <div class="button-container">
      <button class="send-button" [disabled]="!canPlay()" (click)="playCard()">{{ i18n.t('playCard') }}</button>
      <button class="forfeit-button" (click)="forfeit()">{{ i18n.t('forfeit') }}</button>

      <!-- 7-split: divide the 7 across the two selected pawns (sum stays 7). -->
      @if (splitVisible()) {
        <div class="pawn-steps">
          <label class="pawn-steps__label pawn-steps__label--1">◆</label>
          <input class="pawn-steps__input pawn-steps__input--1" type="number" min="0" max="7"
                 [value]="stepsPawn1()" (input)="onStepsPawn1($any($event.target).value)" />
          <label class="pawn-steps__label pawn-steps__label--2">◆</label>
          <input class="pawn-steps__input pawn-steps__input--2" type="number" min="0" max="7"
                 [value]="stepsPawn2()" (input)="onStepsPawn2($any($event.target).value)" />
        </div>
      }
    </div>
  </div>
}
