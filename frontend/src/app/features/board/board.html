@if (tiles().length) {
  <div class="board" [style.--cell.px]="cell()">
    @for (t of tiles(); track t.playerId + ':' + t.tileNr) {
      <div class="tile"
           [style.left.px]="t.x"
           [style.top.px]="t.y"
           [style.background-color]="t.color"></div>
    }
    @for (p of pawns(); track p.id){
      <div class="pawn" [style.left.px]="p.left" [style.top.px]="p.top" [style.z-index]="p.zIndex" [style.background-color]="p.color" [id]="p.id"></div>
    }
  </div>
}
