@if (tiles().length) {
  <div class="board" [style.--cell.px]="cell()">
    @for (t of tiles(); track t.playerId + ':' + t.tileNr) {
      <div class="tile"
           [style.left.px]="t.x"
           [style.top.px]="t.y"
           [style.background-color]="t.color"></div>
    }
    @for (p of pawns(); track p.id){
      <app-pawn class="pawn"
                [color]="p.color"
                (click)="selectPawn(p.id)"
                [highlight]="selectedPawnId() === p.id ? highlightForPawn1(p.color) : undefined"
                [style.left.px]="p.left"
                [style.top.px]="p.top"
                [style.z-index]="p.zIndex" />
    }
    <div class="hand">
      @for (c of hand(); track c.uuid) {
        <app-card
          [suit]="c.suit"
          [value]="c.value"
          [class.selected]="selectedCardUuid() === c.uuid"
          (click)="selectCard(c.uuid)"/>
      }
    </div>
  </div>
}
