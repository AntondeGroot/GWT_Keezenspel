@if (tiles().length) {
  <div class="play">
    <div class="stage">
      <div class="board" [style.--cell]="cell() / 6">
        @for (t of tiles(); track t.playerId + ':' + t.tileNr) {
          <div
            class="tile"
            [class.tile-highlight-pulse]="
              isPreview(t.playerId, t.tileNr) && !isTeammateCapture(t.playerId, t.tileNr)
            "
            [class.tile-capture-warning]="isTeammateCapture(t.playerId, t.tileNr)"
            [style.left.%]="t.x / 6"
            [style.top.%]="t.y / 6"
            [style.--tile-color]="t.color"
          ></div>
        }
        @for (p of pawns(); track p.id) {
          <app-pawn
            class="pawn"
            animate.leave="pawn-leaving"
            [attr.data-testid]="'pawn-' + p.id"
            [color]="p.color"
            [teamId]="p.teamId"
            (click)="selectPawn(p.id)"
            [highlight]="
              p.id === pawn1Id()
                ? highlightForPawn1(p.color)
                : p.id === pawn2Id()
                  ? highlightForPawn2(p.color)
                  : undefined
            "
            [style.left.%]="p.x / 6"
            [style.top.%]="p.y / 6"
            [style.--move-ms]="p.moveMs + 'ms'"
            [style.z-index]="p.zIndex"
          />
        }
      </div>

      <!-- Cards live in their own layer (not inside .board), overlaid on the same
           box so the pile lines up with the board centre. The hand sits below in
           the reserved space (.stage padding). Opponents' fanned card backs render
           here too (the board supplies their positions from its own geometry). -->
      <app-card-layer
        [cards]="cardTable.cards()"
        [flyers]="cardTable.flyers()"
        [backs]="cardBacks()"
        [options]="cardTable.options"
        [selectedUuid]="selectedCardUuid() ?? null"
        [isSpecial]="isSpecial"
        (cardClick)="selectCard($event)"
        (cardHover)="hoverCard($event)"
      />
    </div>

    <!-- Suggestion for the hovered/selected special card (empty for regular cards).
         A flow row centered below the hand; the cards stay absolutely positioned so
         a played card can still fly to the pile. -->
    <div class="card-hint">{{ hint() }}</div>

    <!-- Actions + roster. Desktop: a column pinned to the right gutter. Mobile: a
         row directly below the hint. -->
    <div class="controls">
      <div class="button-container">
        <button class="send-button" [disabled]="!canPlay()" (click)="playCard()">
          {{ i18n.t('playCard') }}
        </button>
        <button class="forfeit-button" [disabled]="!canForfeit()" (click)="forfeit()">
          {{ i18n.t('forfeit') }}
        </button>
        @if (teamTrade.canAsk()) {
          <button class="ask-trade-button" (click)="teamTrade.ask()">
            {{ i18n.t('tradeAskButton') }}
          </button>
        }

        <!-- 7-split: divide the 7 across the two selected pawns (sum stays 7). -->
        @if (splitVisible()) {
          <div class="pawn-steps">
            <div class="pawn-steps__row">
              <label
                class="pawn-steps__label"
                for="pawn-steps-1"
                [style.color]="pawn1Highlight()"
                >{{ i18n.t('pawn1') }}</label
              >
              <button type="button" class="pawn-step-btn" (click)="stepPawn1(-1)">−</button>
              <input
                class="pawn-steps__input"
                type="number"
                min="0"
                max="7"
                id="pawn-steps-1"
                [style.border-color]="pawn1Highlight()"
                [value]="stepsPawn1()"
                (input)="onStepsPawn1($any($event.target).value)"
              />
              <button type="button" class="pawn-step-btn" (click)="stepPawn1(1)">+</button>
            </div>
            <div class="pawn-steps__row">
              <label
                class="pawn-steps__label"
                for="pawn-steps-2"
                [style.color]="pawn2Highlight()"
                >{{ i18n.t('pawn2') }}</label
              >
              <button type="button" class="pawn-step-btn" (click)="stepPawn2(-1)">−</button>
              <input
                class="pawn-steps__input"
                type="number"
                min="0"
                max="7"
                id="pawn-steps-2"
                [style.border-color]="pawn2Highlight()"
                [value]="stepsPawn2()"
                (input)="onStepsPawn2($any($event.target).value)"
              />
              <button type="button" class="pawn-step-btn" (click)="stepPawn2(1)">+</button>
            </div>
          </div>
        }
      </div>

      <app-player-list />
    </div>
  </div>

  <app-trade-panel
    [hand]="hand()"
    [trade]="teamTrade.pending()"
    [viewerId]="viewerId ?? ''"
    [sessionId]="sessionId ?? ''"
    [offering]="teamTrade.offering()"
    [otherName]="teamTrade.otherName()"
    (closed)="teamTrade.stopOffering()"
    (cancelledByMe)="teamTrade.cancelledByMe()"
  />
}
