<div class="vol" [attr.data-level]="level()">
  <button
    type="button"
    class="vol__icon"
    (click)="toggleMute()"
    [attr.aria-label]="level() === 'muted' ? 'Unmute' : 'Mute'"
    title="Mute / unmute"
  >
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <!-- speaker body -->
      <path class="spk" d="M4 9.5 h3 l4 -3.2 v11.4 l-4 -3.2 H4 Z" />
      <!-- sound waves — shown by level -->
      <path class="wave wave--1" d="M13.6 9.4 a3.6 3.6 0 0 1 0 5.2" />
      <path class="wave wave--2" d="M16 6.8 a7.4 7.4 0 0 1 0 10.4" />
      <!-- mute cross -->
      <path class="mute-x" d="M14.5 9.4 l5 5.2 M19.5 9.4 l-5 5.2" />
    </svg>
  </button>

  <input
    class="vol__range"
    type="range"
    min="0"
    max="1"
    step="0.01"
    [value]="sound.volume()"
    (input)="onInput($any($event.target).value)"
    [style.--fill.%]="pct()"
    aria-label="Volume"
  />
</div>
