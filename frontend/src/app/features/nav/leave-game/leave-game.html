@if (inGame) {
  <button class="leaveGameButton" (click)="ask()" [attr.aria-label]="i18n.t('leaveGame')">
    <!-- Qwixx-style "exit" glyph (a door with an arrow out); shown on mobile. -->
    <svg class="leave-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
      <polyline points="16 17 21 12 16 7" />
      <line x1="21" y1="12" x2="9" y2="12" />
    </svg>
    <span class="leave-label">{{ i18n.t('leaveGame') }}</span>
  </button>

  @if (confirming()) {
    <div class="leave-overlay" (click)="cancel()">
      <div class="leave-dialog" role="dialog" aria-modal="true" (click)="$event.stopPropagation()">
        <p class="leave-dialog__q">{{ i18n.t('confirmLeaveGame') }}</p>
        <div class="leave-dialog__actions">
          <button class="leave-dialog__cancel" (click)="cancel()">{{ i18n.t('confirmLeaveNo') }}</button>
          <button class="leave-dialog__confirm" (click)="confirmLeave()">{{ i18n.t('confirmLeaveYes') }}</button>
        </div>
      </div>
    </div>
  }
}
