playCard = Karte spielen
forfeit = Passen
leaveGame = Spiel verlassen
send = Senden
pawn1 = Figur 1
pawn2 = Figur 2
confirmLeaveGame = Möchtest du das Spiel wirklich verlassen?
canvasNotSupported = Canvas wird in deinem Browser nicht unterstützt.
hintAce = Ass: Setze eine Figur aufs Spielfeld oder bewege sie 1 Schritt vorwärts.
hintFour = Vier: Bewege 4 Schritte rückwärts.\nTipp: Nutze dies auf deinem Startfeld, um das ganze Brett abzukürzen.
hintSeven = Sieben: Mache insgesamt 7 Schritte mit einer oder zwei Figuren.\n- Wähle erst die Karte, dann optional eine zweite Figur. Hinweis: Figur 1 bewegt sich immer zuerst.
hintJack = Bube: Tausche deine Figur mit einer feindlichen Figur.\nEinen geeigneten Gegner kannst du erst nach dem Wählen dieser Karte auswählen.
hintQueen = Dame: Bewege 12 Schritte vorwärts.
hintKing = König: Setze eine Figur aufs Spielfeld.