<!doctype html>
<!-- Mobile layout: fixed 1100px viewport so the browser scales the whole
     desktop layout down to fit the phone screen proportionally.
     This ensures the title bar always spans the full width and the
     game board never overflows or requires manual zoom. -->

<html>

  <head>
    <meta charset=UTF-8>
    <!-- Fixed viewport width = game board width + sidebar + breathing room.
         NO initial-scale — the browser automatically calculates the correct
         scale to fit 1100px into the phone's screen width (e.g. ~0.36 on
         a 393px iPhone). Specifying initial-scale=1.0 would keep 1:1 zoom
         and show only a 393px slice of the 1100px layout (zoomed in). -->
    <meta name="viewport" content="width=1100">
    <!-- Colours the browser chrome / system nav bar to match the footer -->
    <meta name="theme-color" content="#4a2610">
    <script>
      // Tablets and desktops (real CSS screen width >= 768px) use the desktop layout
      if (window.screen.width >= 768) {
        window.location.replace('index.html' + window.location.search);
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link type="text/css" rel="stylesheet" href="GWT_Keezenspel.css">
    <link type="text/css" rel="stylesheet" href="mobile.css">

    <title>Keezenspel</title>

    <script src="app/app.nocache.js"></script>
    <script src="mobile-ux.js"></script>
  </head>

  <body>

    <!-- RECOMMENDED if your web app will not function without JavaScript enabled -->
    <noscript>
      <div style="width: 22em; position: absolute; left: 50%; margin-left: -11em; color: red; background-color: white; border: 1px solid red; padding: 4px; font-family: sans-serif">
        Your web browser must have JavaScript enabled
        in order for this application to display correctly.
      </div>
    </noscript>

    <h1>Keezenspel</h1>

    <footer></footer>
  </body>
  <img id="profilepics" src ="profilepics.png" style="display: none;">
  <img id="pawn" src ="pawn.png" style="display: none;">
  <img id="pawn_outline" src ="pawn_outline.png" style="display: none;">
  <img id="pawn0" src ="pawn0.png" style="display: none;">
  <img id="pawn1" src ="pawn1.png" style="display: none;">
  <img id="pawn2" src ="pawn2.png" style="display: none;">
  <img id="pawn3" src ="pawn3.png" style="display: none;">
  <img id="pawn4" src ="pawn4.png" style="display: none;">
  <img id="pawn5" src ="pawn5.png" style="display: none;">
  <img id="pawn6" src ="pawn6.png" style="display: none;">
  <img id="pawn7" src ="pawn7.png" style="display: none;">
  <img id="cards" src ="card-deck.png" style="display: none;">
  <img id="medals" src ="medals.png" style="display: none;">

    .pawn {
      display: none;
    }
    #cards {
      display: none;
    }
  </style>
</html>
